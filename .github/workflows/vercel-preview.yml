name: Vercel Deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Check required secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          missing=""
          [ -z "${VERCEL_TOKEN}" ] && missing="${missing} VERCEL_TOKEN"
          [ -z "${VERCEL_ORG_ID}" ] && missing="${missing} VERCEL_ORG_ID"
          [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ] && missing="${missing} NEXT_PUBLIC_SUPABASE_URL"
          [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ] && missing="${missing} NEXT_PUBLIC_SUPABASE_ANON_KEY"
          [ -z "${RESEND_API_KEY}" ] && missing="${missing} RESEND_API_KEY"
          if [ -n "${missing}" ]; then
            echo "::error::Missing GitHub secrets:${missing}"
            echo "Set them under: repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets present."

      - name: Link Vercel Project
        env:
          # Project ID is not a secret (it's a public identifier). Hardcoded
          # so the workflow keeps working even if a secret is missing.
          VERCEL_PROJECT_ID: prj_FmmQa8SAiC8mNdMaxLZ7AEnNqg8j
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -z "${VERCEL_ORG_ID}" ]; then
            echo "::error::Missing VERCEL_ORG_ID secret. Set it under repo Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {
            "orgId": "${VERCEL_ORG_ID}",
            "projectId": "${VERCEL_PROJECT_ID}"
          }
          EOF

      - name: Deploy To Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          deploy_args=""
          deploy_label="Preview"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            deploy_args="--prod"
            deploy_label="Production"
          fi

          deploy_url=$(vercel deploy --token="${VERCEL_TOKEN}" --yes --force ${deploy_args} \
            -m githubCommitSha="${{ github.sha }}" \
            -m githubCommitRef="${{ github.ref_name }}" \
            -b NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL}" \
            -b NEXT_PUBLIC_SUPABASE_ANON_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
            -b NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL}" \
            -e NEXT_PUBLIC_SUPABASE_URL="${NEXT_PUBLIC_SUPABASE_URL}" \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY="${NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
            -e NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL}" \
            -e STRIPE_SECRET_KEY="${STRIPE_SECRET_KEY}" \
            -e STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET}" \
            -e STRIPE_PRO_PRICE_ID="${STRIPE_PRO_PRICE_ID}" \
            -e SUPABASE_DB_URL="${SUPABASE_DB_URL}" \
            -e RESEND_API_KEY="${RESEND_API_KEY}")

          echo "deploy_label=${deploy_label}" >> "${GITHUB_OUTPUT}"
          echo "deploy_url=${deploy_url}" >> "${GITHUB_OUTPUT}"

      - name: Deployment URL
        run: echo "${{ steps.deploy.outputs.deploy_label }} deployed to ${{ steps.deploy.outputs.deploy_url }}"
